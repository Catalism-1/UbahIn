name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Lint
        run: python -m ruff check src tests
      - name: Test
        run: .\run_tests.bat
      - name: Smoke import
        env:
          PYTHONPATH: src
        run: python -c "from ubahin.core import JobManager; from ubahin.native_bridge import native_status; print(native_status()); print(JobManager)"
