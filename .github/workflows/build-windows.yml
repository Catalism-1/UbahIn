name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install maturin
      - name: Build native module
        continue-on-error: true
        working-directory: native/ubahin_native
        run: python -m maturin build --release --target x86_64-pc-windows-msvc
      - name: Install native wheel
        run: |
          $wheel = Get-ChildItem native\ubahin_native\target\wheels\*.whl | Select-Object -First 1
          if ($wheel) {
            python -m pip install $wheel.FullName
          } else {
            Write-Host "Native wheel not found; continuing with Python fallback."
          }
      - name: Test
        run: .\run_tests.bat
      - name: Build portable
        run: .\build_portable.bat
      - name: Build installer
        run: .\build_installer.bat
      - name: Zip portable
        run: Compress-Archive -Path dist\Ubahin\* -DestinationPath dist\Ubahin-Portable.zip -Force
      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: Ubahin-Portable
          path: dist/Ubahin-Portable.zip
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Ubahin-Setup
          path: dist/installer/Ubahin_Setup.exe
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Ubahin-Portable.zip
            dist/installer/Ubahin_Setup.exe
