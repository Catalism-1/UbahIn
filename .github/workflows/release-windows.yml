name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build and Test Assets
        run: .\build_release_assets.bat
        
      - name: Set Prerelease Status
        id: check_prerelease
        run: |
          if ("${{ github.ref }}" -match "-beta") {
            echo "prerelease=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "prerelease=false" >> $env:GITHUB_OUTPUT
          }
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/release/Ubahin_Setup.exe
            dist/release/Ubahin_Portable_Windows_x64.zip
            dist/release/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
